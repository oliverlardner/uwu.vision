# Triggers a server-side git pull. The server already has a GitHub deploy key configured
# for the clone at DEPLOY_PATH, so the runner only needs to SSH in and update the working tree.
name: Deploy to cPanel

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-cpanel
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.CPANEL_SSH_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SSH_PRIVATE_KEY:-}" ]; then echo "::error::CPANEL_SSH_KEY secret is empty or unset"; exit 1; fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" | sed 's/\r$//' > ~/.ssh/cpanel_deploy
          chmod 600 ~/.ssh/cpanel_deploy
          touch ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Git pull on server
        env:
          SSH_HOST: ${{ secrets.CPANEL_HOST }}
          SSH_USER: ${{ secrets.CPANEL_USER }}
          SSH_PORT: ${{ secrets.CPANEL_SSH_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          if [ -z "${SSH_HOST:-}" ]; then echo "::error::CPANEL_HOST secret is empty or unset"; exit 1; fi
          if [ -z "${SSH_USER:-}" ]; then echo "::error::CPANEL_USER secret is empty or unset"; exit 1; fi
          REPO_DIR="${DEPLOY_PATH:-/home/uwuvision/uwu.vision}"
          PORT_ARG=
          if [ -n "${SSH_PORT:-}" ]; then PORT_ARG="-p ${SSH_PORT}"; fi
          ssh ${PORT_ARG} \
            -i ~/.ssh/cpanel_deploy \
            -o IdentitiesOnly=yes \
            -o ConnectTimeout=30 \
            -o StrictHostKeyChecking=accept-new \
            -o UserKnownHostsFile="${HOME}/.ssh/known_hosts" \
            "${SSH_USER}@${SSH_HOST}" \
            "set -euo pipefail; cd '${REPO_DIR}' && git fetch --prune origin && git reset --hard origin/main && git log -1 --oneline"
